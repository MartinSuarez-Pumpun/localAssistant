<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>LocalAiAssistant</title>

    <link rel="stylesheet" href="/static/fonts/material-symbols.css"/>
    <link data-trunk rel="copy-dir" href="static/"/>

    <!-- Tailwind CDN (dev; en release se reemplaza por build) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#1a56db",
                        "primary-cont": "#93c5fd",
                        action: "#1a56db",
                        "action-light": "#60a5fa",
                        surface: "#f9fafb",
                        "surf-low": "#f3f4f6",
                        "surf-cont": "#e5e7eb",
                        "surf-high": "#d1d5db",
                        "surf-highest": "#9ca3af",
                        "on-surf": "#111827",
                        "on-surf-var": "#374151",
                        outline: "#6b7280",
                        "outline-var": "#d1d5db",
                        "sec-cont": "#bfdbfe",
                        "on-sec-cont": "#1e40af",
                    },
                },
            },
        };
    </script>

    <style>
        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #f9fafb;
        }

</style>
</head>
<body>
<!-- Indicador de carga visible hasta que el WASM arranque -->
<div id="_loading" style="
    position:fixed;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    background:#f9fafb;z-index:9999;
">
    <div style="
        width:36px;height:36px;border-radius:50%;
        border:3px solid #e5e7eb;border-top-color:#1a56db;
        animation:_spin 0.8s linear infinite;
    "></div>
    <p style="margin-top:16px;font-family:sans-serif;font-size:14px;color:#6b7280;">
        Cargando…
    </p>
</div>
<style>
    @keyframes _spin { to { transform: rotate(360deg); } }
</style>
<!-- Leptos monta aquí -->
<div id="app"></div>
<link data-trunk data-wasm-opt="z" rel="rust"/>
<script>
    // Ocultar el loader cuando Leptos termine de montar
    document.addEventListener('TrunkApplicationStarted', function() {
        var el = document.getElementById('_loading');
        if (el) el.style.display = 'none';
    });
</script>
</body>
</html>
